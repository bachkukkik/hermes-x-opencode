services:
  hermes-opencode:
    build:
      context: .
      dockerfile: volumes_hermes_opencode/build/Dockerfile
    # ports:
    #   - "${HERMES_WEBUI_PORT:-8787}:8787"
    #   - "${HERMES_API_PORT:-8642}:8642"
    #   - "${OPENCODE_SERVE_PORT:-4096}:4096"
    #   - "${BROWSER_VNC_PORT:-6901}:6901"
    #   - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    # Internal-only: exposed within the docker network (not published to host).
    # Uncomment the `ports:` block above to publish these to the host instead.
    expose:
      - "8787"
      - "8642"
      - "4096"
      - "6901"
      - "9119"
    # Optional: Uncomment to allow container to reach host services.
    # Required on Linux when OPENAI_BASE_URL points to a host-side proxy.
    # Fix #31: host.docker.internal does not resolve on vanilla Linux Docker.
    # This maps host.docker.internal to the host's gateway IP inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./volumes_hermes_opencode/data/hermes-home:/home/hermeswebui/.hermes
      # Optional: Mount host wiki directory for llm-wiki skill persistence.
      # Uncomment and set to your host wiki path (e.g. ~/.hermes/wiki) to share
      # your personal wiki with the agent inside the container.
      # Without this mount, wiki data lives inside the hermes-home bind mount.
      # - ${HERMES_WIKI_VOLUME:-/dev/null}:/home/hermeswebui/.hermes/wiki
      - ${HERMES_WORKSPACE:-./volumes_hermes_opencode/data/workspace}:/workspace
    environment:
      - WANTED_UID=${HOST_UID:-1000}
      - WANTED_GID=${HOST_GID:-1000}
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-}
      - OPENAI_SMALL_MODEL=${OPENAI_SMALL_MODEL:-}
      - HERMES_DEFAULT_MODEL=${HERMES_DEFAULT_MODEL:-${OPENAI_DEFAULT_MODEL:-}}
      - OPENCODE_DEFAULT_MODEL=${OPENCODE_DEFAULT_MODEL:-${OPENAI_DEFAULT_MODEL:-}}
      - OPENCODE_SMALL_MODEL=${OPENCODE_SMALL_MODEL:-${OPENAI_SMALL_MODEL:-${OPENAI_DEFAULT_MODEL:-}}}
      - OPENCODE_FALLBACK_MODEL=${OPENCODE_FALLBACK_MODEL:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - HERMES_WEBUI_SKIP_ONBOARDING=${HERMES_WEBUI_SKIP_ONBOARDING:-}
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - HERMES_WEBUI_PASSWORD=${HERMES_WEBUI_PASSWORD:-}
      - HERMES_HOME=/home/hermeswebui/.hermes
      - SKIP_SKILL_INSTALL=${SKIP_SKILL_INSTALL:-}
      - HERMES_YOLO_MODE=${HERMES_YOLO_MODE:-1}
      - HERMES_DELEGATION_MAX_ITERATIONS=${HERMES_DELEGATION_MAX_ITERATIONS:-50}
      - HERMES_GOAL_MAX_TURNS=${HERMES_GOAL_MAX_TURNS:-50}
      - HERMES_DASHBOARD_ENABLED=${HERMES_DASHBOARD_ENABLED:-false}
      - HERMES_DASHBOARD_PORT=${HERMES_DASHBOARD_PORT:-9119}
      - HERMES_DASHBOARD_HOST=${HERMES_DASHBOARD_HOST:-0.0.0.0}
      - OPENCODE_SECURITY_MODE=${OPENCODE_SECURITY_MODE:-strict}
      - OPENCODE_SERVE_ENABLED=${OPENCODE_SERVE_ENABLED:-false}
      - OPENCODE_SERVE_BOOT_TIMEOUT=${OPENCODE_SERVE_BOOT_TIMEOUT:-30}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - BROWSER_HUMAN_LOOP_ENABLED=${BROWSER_HUMAN_LOOP_ENABLED:-false}
      - BROWSER_VNC_PASSWORD=${BROWSER_VNC_PASSWORD:-}
      - WIKI_PATH=/home/hermeswebui/.hermes/wiki
    networks:
      default:
        aliases:
          - hermes-opencode
    # Set OPENCODE_SERVE_ENABLED=true to start `opencode serve` on :4096.
    # Disabled by default — serve exits immediately without an LLM provider.
    # Example .env override: OPENCODE_SERVE_ENABLED=true
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10
    restart: unless-stopped
