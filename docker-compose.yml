services:
  hermes-opencode:
    build:
      context: ./volumes_hermes_opencode/build
      dockerfile: Dockerfile
    ports:
      - "${HERMES_WEBUI_PORT:-8787}:8787"
      - "${HERMES_API_PORT:-8642}:8642"
      - "${OPENCODE_SERVE_PORT:-4096}:4096"
    volumes:
      - ./volumes_hermes_opencode/data/hermes-home:/home/hermeswebui/.hermes
      - ${HERMES_WORKSPACE:-./volumes_hermes_opencode/data/workspace}:/workspace
    environment:
      - WANTED_UID=${HOST_UID:-1000}
      - WANTED_GID=${HOST_GID:-1000}
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-}
      - OPENAI_SMALL_MODEL=${OPENAI_SMALL_MODEL:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - HERMES_WEBUI_SKIP_ONBOARDING=${HERMES_WEBUI_SKIP_ONBOARDING:-}
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - HERMES_WEBUI_PASSWORD=${HERMES_WEBUI_PASSWORD:-}
      - HERMES_HOME=/home/hermeswebui/.hermes
      - SKIP_SKILL_INSTALL=${SKIP_SKILL_INSTALL:-}
      - OPENCODE_SECURITY_MODE=${OPENCODE_SECURITY_MODE:-strict}
    networks:
      default:
        aliases:
          - hermes-opencode
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10
    restart: unless-stopped
